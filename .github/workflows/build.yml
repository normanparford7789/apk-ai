name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Debug APK ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Control-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release APK (auto-signed with generated keystore) ─────────────────
      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/ai-control-release.jks \
            -alias ai-control \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass aicontrol123 -keypass aicontrol123 \
            -dname "CN=AI Control, OU=App, O=AIControl, L=City, S=State, C=US"

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          SIGNING_KEY_ALIAS: ai-control
          SIGNING_KEY_PASSWORD: aicontrol123
          SIGNING_STORE_FILE: ai-control-release.jks
          SIGNING_STORE_PASSWORD: aicontrol123

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Control-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
